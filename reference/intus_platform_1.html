// ══════════════════════════════════════════
// FINANCIAL ENGINE (identical to v6)
// ══════════════════════════════════════════
const calc=(i)=>{
  const aT=i.frente*i.fondo, aE=aT*i.edificabilidad;

  const nApt=i.mixNApt>0?i.mixNApt:Math.floor(aApt/i.tamApto), pApt=i.mixNPk>0?i.mixNPk:Math.floor(i.parqApto*nApt);
  const nOfi=i.uniOfi, aOfiUni=nOfi>0?aOfi/nOfi:0;

  const aTerrTotal=terrenos.reduce((s,t)=>s+t.areaM2,0);
  const cConstBase=i.costoMode==="estimado"

    : i.acabComOfi*(aCom+aOfi)+i.acabAmen*aAmen+i.acabApt*aApt+i.acabSot*aSot+i.excCosto*exc+(i.ciment+i.equip+i.extrac+i.instElec+i.instHidro+i.obraPrim+i.obraSec)*aConst+i.prelim*aT+(i.frente*i.snFrente+i.fondo*i.snFondo)*3.2*cSot*i.snCosto+(i.frente*i.pilFrente+i.fondo*i.pilFondo)*3.2*cSot*i.pilCosto;
  const cConst=cConstBase*1.12;
  const eqItems=[[i.eqLobby,i.eqLobbyCost],[i.eqTerraza,i.eqTerrazaCost],[i.eqElectro,i.eqElectroCost],[i.eqCocinas,i.eqCocinasCost],[i.eqCCTV,i.eqCCTVCost],[i.eqEspejos,i.eqEspejosCost],[i.eqJardin,i.eqJardinCost],[i.eqSenal,i.eqSenalCost],[i.eqOrnato,i.eqOrnatoCost]];

  const vAptSinImp=i.tamApto*nApt*i.pvM2+pApt*i.pvParq;
  const noi=(((i.rentaM2-i.opexM2)*aCom)+((i.rentaParq-i.costoParq)*pCom))*12;
  const vComSinImp=aCom>0?noi/(i.capRate/100):0;
  const vOfiSinImp=nOfi>0?aOfiUni*nOfi*i.pvOfiM2+pOfi*i.pvParqOfi:0;
  const vProy=vAptSinImp+vComSinImp+vOfiSinImp;

  const vProyConImp=vAptConImp+vComConImp+vOfiConImp;
  const timbresIusi=(i.timbresIusi/100)*vProy;
  const cTerr=precioTerreno+timbresIusi;
  const opAdminSI=(i.pctAdminDes/100)*vProy,opTecSI=(i.pctGasTec/100)*vProy,opLicSI=((i.pctLic||1.75)/100)*vProy+(i.iauCost||0);
  const opLegSI=(i.pctGasLeg/100)*vProy,opMercSI=(i.pctMerc/100)*vProy,opAdmVSI=(i.pctAdmVtas/100)*vProy;
  const opComzSI=(i.pctComz/100)*(vAptSinImp+vOfiSinImp);
  const tOpExSI=opAdminSI+opTecSI+opLicSI+opLegSI+opMercSI+opAdmVSI+opComzSI;
  const opAdmin=opAdminSI*1.12,opTec=opTecSI*1.12,opLic=opLicSI;
  const opLeg=opLegSI*1.12,opMerc=opMercSI*1.12,opAdmV=opAdmVSI*1.12,opComz=opComzSI*1.12;
  const tOpEx=opAdmin+opTec+opLic+opLeg+opMerc+opAdmV+opComz;
  const tCostos=cTerr+cConst+cEquip+tOpEx;
  const dur=i.planif+i.const+i.postConst;
  const mBruto=vProy>0?(vProy-cConstBase-cEquipBase-cTerr)/vProy:0;
  const ebitAbs=vProy-cConstBase-cEquipBase-cTerr-tOpExSI;
  const mEBIT=vProy>0?ebitAbs/vProy:0;
  const taxBase=(vAptConImp+vOfiConImp)/1.093;

  const mIC=i.planif,mFC=i.planif+i.const,mIV=i.mesIniVtas-1;
  const mesesVta=Math.ceil(nApt/Math.max(i.ritmoVtas,1));
  const costM=new Array(months).fill(0),incM=new Array(months).fill(0);
  const terrPurchM=new Array(months).fill(0); // Track terrain PURCHASE payments separately
  // ALWAYS add terrain purchase payments to cash flow
  for(const t of terrenos){const pagos=t.pagos||[];if(pagos.length>0){for(const p of pagos){const m=p.mes-1;if(m>=0&&m<months){costM[m]+=t.costo*(p.pct/100);terrPurchM[m]+=t.costo*(p.pct/100);}}}else{if(months>0){costM[0]+=t.costo;terrPurchM[0]+=t.costo;}}}
  // IUSI: ALWAYS paid by developer (even when aportado)
  {const iM=Math.max(dur-1,1);const iusiPM=timbresIusi/iM;for(let m=1;m<dur&&m<months;m++)costM[m]+=iusiPM;}
  // Admin desarrollo: evenly across months 0 to mFC-1
  {const admPM=opAdmin/Math.max(mFC,1);for(let m=0;m<mFC&&m<months;m++)costM[m]+=admPM;}
  // Construction distribution curve
  const cd=gCD(i.const);
  // Gastos técnicos: 85% during planning, 15% during construction (matches Excel pattern)
  {const tecPlan=opTec*0.85;const tecConst=opTec*0.15;
  const tecPlanPM=tecPlan/Math.max(mIC,1);for(let m=0;m<mIC&&m<months;m++)costM[m]+=tecPlanPM;
  for(let ci=0;ci<cd.length&&(mIC+ci)<months;ci++)costM[mIC+ci]+=tecConst*cd[ci];}
  // Licencias: opLic/360 per month during planning, bulk at start of construction
  {const licMonthly=opLic/360;for(let m=0;m<Math.min(mIC,months);m++)costM[m]+=licMonthly;

  // Equipo: last third of construction
  {const eqMonths=Math.max(Math.ceil(i.const/3),1);const eqStart=mFC-eqMonths;const eqPM=cEquip/eqMonths;
  for(let m=Math.max(eqStart,mIC);m<mFC&&m<months;m++)costM[m]+=eqPM;}

  {const legPM=opLeg/Math.max(i.const,1);for(let m=mIC;m<mFC&&m<months;m++)costM[m]+=legPM;}
  // Mercadeo: pre-launch + pre-sales + during sales
  if(months>0)costM[0]+=opMerc*0.093;if(mIV-2>=0&&mIV-2<months)costM[mIV-2]+=opMerc*0.185;
  {const mercPM=opMerc*0.722/Math.max(mesesVta,1);for(let m=mIV;m<Math.min(mIV+mesesVta,months);m++)costM[m]+=mercPM;}
  // Admin ventas: evenly from mIV to mFC-1
  {const admSpan=Math.max(mFC-mIV,1);const admvPM=opAdmV/admSpan;for(let m=mIV;m<mFC&&m<months;m++)costM[m]+=admvPM;}
  // Comercialización: 30% reserva / 50% enganche / 20% contra entrega per batch
  {const comApt=(i.pctComz/100)*vAptSinImp*1.12;const cPA=nApt>0?comApt/nApt:0;
  for(let m=mIV;m<Math.min(mIV+mesesVta,months);m++){const sold=Math.min(i.ritmoVtas,nApt-(m-mIV)*i.ritmoVtas);if(sold<=0)break;const bc=sold*cPA;
  costM[m]+=bc*0.30;const mTE=Math.max(mFC-m-1,1);for(let em=m+1;em<Math.min(m+mTE+1,months);em++)costM[em]+=(bc*0.50)/mTE;
  if(mFC-1>=0&&mFC-1<months)costM[mFC-1]+=bc*0.20;}}
  const mVO=Math.ceil(nOfi/Math.max(i.ritmoOfi,1));
  {const comOfi=(i.pctComz/100)*vOfiSinImp*1.12;const cPO=nOfi>0?comOfi/nOfi:0;
  for(let m=mIV;m<Math.min(mIV+mVO,months);m++){const sold=Math.min(i.ritmoOfi,nOfi-(m-mIV)*i.ritmoOfi);if(sold<=0)break;const bc=sold*cPO;
  costM[m]+=bc*0.30;const mTE=Math.max(mFC-m-1,1);for(let em=m+1;em<Math.min(m+mTE+1,months);em++)costM[em]+=(bc*0.50)/mTE;

  // Apt income: reserva + enganche spread + contra entrega by batch across post-construction
  for(let m=mIV;m<Math.min(mIV+mesesVta,months);m++){const sold=Math.min(i.ritmoVtas,nApt-(m-mIV)*i.ritmoVtas);if(sold<=0)break;incM[m]+=sold*unitPC*(i.reserva/100);const engNeto=sold*unitPC*(i.engApt/100)-sold*unitPC*(i.reserva/100);const mTE=Math.max(mFC-m-1,1);for(let em=m+1;em<Math.min(m+mTE+1,months);em++)incM[em]+=engNeto/mTE;const ceAmt=sold*unitPC*(1-i.engApt/100);const bIdx=m-mIV;const ceM=Math.min(mFC+Math.floor(bIdx*Math.max(i.postConst,1)/Math.max(mesesVta,1)),dur-1);if(ceM<months)incM[ceM]+=ceAmt;}

  for(let m=mIV;m<Math.min(mIV+mVO,months);m++){const sold=Math.min(i.ritmoOfi,nOfi-(m-mIV)*i.ritmoOfi);if(sold<=0)break;const uP=nOfi>0?vOfiConImp/nOfi:0;incM[m]+=sold*uP*(i.reserva/100);const mTE=Math.max(mFC-m-1,1);for(let em=m+1;em<Math.min(m+mTE+1,months);em++)incM[em]+=(sold*uP*(i.engOfi/100)-sold*uP*(i.reserva/100))/mTE;const ceAmt=sold*uP*(1-i.engOfi/100);const bIdx=m-mIV;const ceM=Math.min(mFC+Math.floor(bIdx*Math.max(i.postConst,1)/Math.max(mVO,1)),dur-1);if(ceM<months)incM[ceM]+=ceAmt;}

// POT polygon helper functions
function decodePoly(flat){
  const pts=[];let x=flat[0]/POT_SCALE,y=flat[1]/POT_SCALE;pts.push([x,y]);
  for(let i=2;i<flat.length;i+=2){x+=flat[i]/POT_SCALE;y+=flat[i+1]/POT_SCALE;pts.push([x,y]);}return pts;
}
function ptInPoly(lng,lat,flat){
  let inside=false;let x0=flat[0]/POT_SCALE,y0=flat[1]/POT_SCALE;
  for(let i=2;i<flat.length;i+=2){const x1=x0+(flat[i]/POT_SCALE),y1=y0+(flat[i+1]/POT_SCALE);
    if(((y0>lat)!=(y1>lat))&&(lng<(x1-x0)*(lat-y0)/(y1-y0)+x0))inside=!inside;x0=x1;y0=y1;}return inside;
}
function detectZoneKML(lng,lat){
  for(const [z,rings] of POT_POLYS){const outer=rings[0];
    if(ptInPoly(lng,lat,outer)){let inHole=false;for(let r=1;r<rings.length;r++){if(ptInPoly(lng,lat,rings[r])){inHole=true;break;}}if(!inHole)return z;}}return null;
}

// Incentive PE calculation
function calcIncPE(zone,incState,incValues){
  const z=ZG[zone];let total=0;
  Object.keys(incState).forEach(c=>{
    if(!incState[c])return;
    const v=k=>(incValues[k]||0);let pts=0;
    if(c==='F1'){const ph=zone==='G3'?2:zone==='G5'?1.5:2.5;pts=v('F1s')*4+(v('F1p')||0)*ph;}
    else if(c==='O1'){const a=v('O1a');if(zone==='G4'){if(a>=2500)pts=25;else if(a>=1500)pts=15+((a-1500)/1000)*10;else if(a>=800)pts=5+((a-800)/700)*10;}else if(zone==='G3'){pts=a>=2500?30:a>=1500?20:a>=800?10:0;}else if(zone==='G5'){pts=a>=2500?20:a>=1500?10:a>=1000?5:0;}}
    else if(c==='O2'){pts=Math.min(v('O2p')*3,30);}
    else if(c==='O3'){const p=v('O3p'),mn=zone==='G3'?35:40,bp=zone==='G2'?10:15;if(p>=mn)pts=bp+(p-mn)*0.5;}
    else if(c==='O4'){pts=zone==='G3'?20:zone==='G5'?10:15;}
    else if(c==='O5'){pts=v('O5p')*4*(v('O5a')||1);}
    else if(c==='O6'){pts=+(v('O6r'));}
    else if(c==='O7'){pts=v('O7pr')*2.5+v('O7pb')*0.75;}
    else if(c==='U1'){const p=v('U1p'),mn=(zone==='G4'||zone==='G5')?35:50,bp=zone==='G5'?10:zone==='G4'?15:20;pts=p>=mn?bp+(v('U1c')||0):0;}

    else if(c==='S3'){pts=v('S3t')||0;}
    total+=pts;
  });

  return{raw:total,pe:Math.min(total*bonus,100),bonus};
}

// Calculate effective IE from zone + PE
function calcIE(zone,pe){
  const z=ZG[zone];if(!z)return{ie:1,ha:0};
  const ie=Math.min(z.ib+pe*z.fzg,z.ia);
  const ha=z.hb+(ie-z.ib)/(z.ia-z.ib||1)*(z.ha-z.hb);
  return{ie:Math.round(ie*1000)/1000,ha:Math.round(ha),ib:z.ib,ia:z.ia,iau:z.iau,hau:z.hau};
}

// Get highest zone from multiple terrains
function getHighestZone(terrenos){
  const order=['G0','G1','G2','G3','G4','G5'];
  let maxIdx=0;
  (terrenos||[]).forEach(t=>{const idx=order.indexOf(t.potZone||'G4');if(idx>maxIdx)maxIdx=idx;});
  return order[maxIdx];
}

                  <div className="col-span-2 text-right text-sm font-mono text-slate-500">{f0(t.areaM2)}</div>
                  <div className="col-span-1 text-center text-xs font-bold font-mono text-emerald-600">{t.potZone||t.pot||'—'}</div>
                  <div className="col-span-2"><input type="number" value={t.precioVara||''} placeholder="$/v²" onChange={e=>updateTerr(t.id,"precioVara",parseFloat(e.target.value)||0)} className="w-full text-sm font-semibold text-emerald-800 bg-white border border-slate-200 rounded-lg text-right px-2 py-1 focus:ring-2 focus:ring-emerald-400/40 focus:outline-none" step="any"/></div>
                  <div className="col-span-2 text-right text-xs font-mono text-slate-600">{costo>0?fd(costo):'-'}</div>
                  <div className="col-span-2 flex items-center justify-end gap-1">
                    <button onClick={()=>setExpanded(isOpen?null:t.id)} className={`px-2 py-1 rounded text-xs font-semibold ${isOpen?"bg-emerald-100 text-emerald-700":"text-slate-400 hover:text-slate-600 hover:bg-slate-100"}`}>{isOpen?'Cerrar':'Pagos'}</button>
                  </div>
                </div>
                {isOpen&&<div className="ml-4 mr-2 mb-3 p-3 bg-slate-50 rounded-xl border border-slate-200">
                  <div className="flex items-center justify-between mb-2">
                    <span className="text-xs font-bold text-slate-500 uppercase tracking-wider">Forma de Pago</span>
                    {Math.abs(pagoSum-100)>0.1?<span className="text-[10px] text-red-500 font-medium">Suma: {pagoSum}%</span>:<span className="text-[10px] text-emerald-600 font-medium">Total: 100%</span>}
                  </div>
                  {(t.pagos||[]).map((p,pi)=>(
                    <div key={pi} className="flex items-center gap-2 mb-1.5">
                      <span className="text-xs text-slate-400 w-10">Mes</span>
                      <input type="number" value={p.mes} min="1" onChange={e=>updatePago(t.id,pi,"mes",parseInt(e.target.value)||1)} className="w-16 px-2 py-1 text-sm font-semibold text-center bg-white border border-slate-200 rounded-lg focus:outline-none"/>
                      <span className="text-xs text-slate-400 w-8">Pago</span>
                      <input type="number" value={p.pct} step="0.1" onChange={e=>updatePago(t.id,pi,"pct",parseFloat(e.target.value)||0)} className="w-20 px-2 py-1 text-sm font-semibold text-right bg-white border border-slate-200 rounded-lg focus:outline-none"/>
                      <span className="text-xs text-slate-400">%</span>
                      <span className="text-xs font-mono text-slate-400 flex-1 text-right">{fd(costo*(p.pct/100))}</span>
                      {(t.pagos||[]).length>1&&<button onClick={()=>delPago(t.id,pi)} className="text-slate-300 hover:text-red-500"><Ic d={ic.trash} s={12}/></button>}
                    </div>
                  ))}
                  {(!t.pagos||t.pagos.length===0)&&<div className="text-xs text-slate-400 text-center py-2">Sin pagos programados. Se asume 100% en mes 1.</div>}
                  <button onClick={()=>addPago(t.id)} className="mt-2 flex items-center gap-1 text-xs text-emerald-600 font-semibold hover:text-emerald-700"><Ic d={ic.plus} s={12}/>Agregar pago</button>
                </div>}
              </div>
            );
          })}
          <div className="mt-2 pt-3 border-t-2 border-slate-200 space-y-1">
            <R l="Área total terrenos" v={`${f0(totalArea)} m² / ${f0(totalArea*1.43115)} v²`} b/>
            <R l="Costo terrenos" v={fd(totalCosto)} b a/>
            <R l="% sobre ventas" v={vProy>0?fp(totalCosto/vProy):'—'} b/>
          </div>
        </div>
      </>}/>
      <Card t="Impuestos y Aportación" icon={ic.dollar} ch={<>
        <In l="Timbres e IUSI" v={timbresIusi} o={onTimbresChange} sfx="%" step="0.1"/>
        <div className="px-3 py-1 text-[11px] text-slate-400">Se aplica sobre ventas sin impuestos</div>
        <In l="¿Terreno aportado?" v={terrAport} o={onTerrAportChange} opts={["Si","No"]}/>
        <In l="Tipo participación" v={tipoPart} o={onTipoPartChange} opts={["% de equity","Pagado + caro al final"]} wide/>
        <R l="Timbres/IUSI" v={fd(computedTimbres)}/>
        <R l="Costo total terreno" v={fd(computedCTerr)} b a bd/>
      </>}/>
    </div>
  );
};

// ══════════════════════════════════════════
// LEAFLET MAP COMPONENT
// ══════════════════════════════════════════
const MapView=({projects,onOpenProject})=>{
  const [potOn,setPotOn]=useState(true);
  const [satOn,setSatOn]=useState(true);
  const [drawing,setDrawing]=useState(false);
  const [measuring,setMeasuring]=useState(false);
  const [searchQ,setSearchQ]=useState('');
  const [searchResults,setSearchResults]=useState([]);
  const [clickInfo,setClickInfo]=useState(null);
  const [cursorPos,setCursorPos]=useState(null);
  const [polygons,setPolygons]=useState([]);
  const [activeVertices,setActiveVertices]=useState([]);
  const [measurePts,setMeasurePts]=useState([]);
  const [prediosOn,setPrediosOn]=useState(false);
  const potRef=useRef(null);
  const satRef=useRef(null);
  const mapRef=useRef(null);
  const mapInstance=useRef(null);
  const drawLayerRef=useRef(null);
  const activePolyRef=useRef(null);
  const activeMarkersRef=useRef([]);
  const labelLayerRef=useRef(null);
  const measureLayerRef=useRef(null);
  const searchMarkerRef=useRef(null);

  // Haversine distance in meters
  const haversine=(a,b)=>{const R=6371000,dLat=(b[0]-a[0])*Math.PI/180,dLng=(b[1]-a[1])*Math.PI/180;const x=Math.sin(dLat/2)**2+Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));};
  // Polygon area using Shoelace on projected coords (meters)
  const polyAreaM2=(pts)=>{if(pts.length<3)return 0;const R=6371000;const rad=pts.map(p=>[p[0]*Math.PI/180,p[1]*Math.PI/180]);const ref=rad[0];const proj=rad.map(p=>[R*(p[1]-ref[1])*Math.cos(ref[0]),R*(p[0]-ref[0])]);let a=0;for(let i=0;i<proj.length;i++){const j=(i+1)%proj.length;a+=proj[i][0]*proj[j][1]-proj[j][0]*proj[i][1];}return Math.abs(a/2);};
  const fmtDist=m=>m>=1000?(m/1000).toFixed(2)+' km':m.toFixed(1)+' m';
  const fmtArea=m2=>m2>=10000?(m2/10000).toFixed(2)+' ha':m2.toFixed(0)+' m²';

  // Init map - matches v8 vanilla pattern
  useEffect(()=>{
    if(!mapRef.current||mapInstance.current)return;
    const map=L.map(mapRef.current,{doubleClickZoom:false,center:[14.6349,-90.5069],zoom:14,zoomControl:true});
    // Base layer
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:20}).addTo(map);
    // ArcGIS satellite (same URL as v8 — opacity 0.6 so base shows through)
    const sat=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:20,opacity:0.6});
    sat.addTo(map);
    satRef.current=sat;
    // POT polygons on top
    try{
      const pg=L.layerGroup();
      for(const[z,rings]of POT_POLYS){const col=POT_COLORS[z]||'#888';
        const lr=rings.map(r=>{const pts=decodePoly(r);return pts.map(([lng,lat])=>[lat,lng]);});
        L.polygon(lr,{color:col,weight:0.8,opacity:0.7,fillColor:col,fillOpacity:0.35,interactive:false}).addTo(pg);
      }
      pg.addTo(map);potRef.current=pg;
      pg.bringToFront();
    }catch(e){console.warn('POT err',e);}
    drawLayerRef.current=L.layerGroup().addTo(map);
    labelLayerRef.current=L.layerGroup().addTo(map);
    measureLayerRef.current=L.layerGroup().addTo(map);
    map.on('mousemove',e=>setCursorPos([e.latlng.lat.toFixed(6),e.latlng.lng.toFixed(6)]));
    mapInstance.current=map;
    setTimeout(()=>map.invalidateSize(),300);
  },[]);

  // Project markers
  useEffect(()=>{
    const map=mapInstance.current;if(!map)return;
    map.eachLayer(l=>{if(l instanceof L.Marker&&!l._isSearch)map.removeLayer(l);});
    projects.forEach(p=>{
      const lat=p.inputs?.lat||0,lng=p.inputs?.lng||0;
      if(!lat||!lng)return;
      let r=null;try{r=calc({...D,...p.inputs});}catch{}
      const marker=L.marker([lat,lng]).addTo(map);
      const nm=p.inputs.nombre||'Sin nombre';
      const terrenos=p.inputs.terrenos||[];
      const pots=[...new Set(terrenos.map(t=>t.potZone||t.pot).filter(Boolean))].join(', ');
      const equipo=p.inputs.equipo||'';const dev=p.inputs.desarrollador||'';const areaV2=r?f0((r.aTerrTotal||0)*1.43115):'—';
      const avgPrecio=terrenos.length>0?terrenos.reduce((s,t)=>s+t.precioVara,0)/terrenos.length:0;
      marker.bindPopup(`<div style="font-family:'DM Sans',sans-serif;min-width:240px"><div style="font-weight:700;font-size:13px;color:#1e293b">${nm}</div><div style="font-size:10px;color:#94a3b8;margin-bottom:2px">${p.inputs.ubicacion||''}</div>${equipo||dev?`<div style="font-size:10px;color:#64748b;margin-bottom:4px">${equipo}${equipo&&dev?' · ':''}${dev}</div>`:''}<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:8px 10px;margin-bottom:8px"><div style="font-size:10px;color:#16a34a;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px">Precio por vara</div><div style="font-size:20px;font-weight:800;color:#15803d;font-family:'JetBrains Mono',monospace">$${avgPrecio.toFixed(0)}/v²</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:3px;font-size:10px"><div>Fecha: <b>${new Date(p.at).toLocaleDateString()}</b></div><div>POT: <b>${pots||'—'}</b></div><div>Valor: <b>${r?fd(r.vProy):'—'}</b></div><div>Área edif.: <b>${r?f0(r.aE)+' m²':'—'}</b></div><div>TIR: <b style="color:${r&&r.airrBT>0.15?'#059669':'#dc2626'}">${r&&r.airrBT?fp(r.airrBT):'—'}</b></div><div>MOIC: <b>${r&&r.moicBT?f2(r.moicBT)+'x':'—'}</b></div></div><button onclick="window.__openProject('${p.id}')" style="width:100%;margin-top:8px;padding:5px;background:#059669;color:white;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer">Abrir proyecto</button></div>`);
    });
  },[projects]);

  // Drawing handler
  useEffect(()=>{
    const map=mapInstance.current;if(!map)return;
    const onClick=e=>{
      if(drawing){
        const pt=[e.latlng.lat,e.latlng.lng];
        setActiveVertices(prev=>{
          const nv=[...prev,pt];
          // Redraw active polygon preview
          if(activePolyRef.current){map.removeLayer(activePolyRef.current);}
          activeMarkersRef.current.forEach(m=>map.removeLayer(m));activeMarkersRef.current=[];
          if(nv.length>=2){
            activePolyRef.current=L.polygon(nv,{color:'#34D399',weight:2,fillOpacity:0.15,dashArray:'5,5'}).addTo(map);
          }
          // Vertex markers + distance labels
          nv.forEach((v,i)=>{
            const m=L.circleMarker(v,{radius:5,color:'#059669',fillColor:'#34D399',fillOpacity:1,weight:2}).addTo(map);
            activeMarkersRef.current.push(m);
            if(i>0){
              const d=haversine(nv[i-1],v);
              const mid=[(nv[i-1][0]+v[0])/2,(nv[i-1][1]+v[1])/2];
              const lbl=L.tooltip({permanent:true,direction:'center',className:'dist-label'}).setLatLng(mid).setContent(fmtDist(d)).addTo(map);
              activeMarkersRef.current.push(lbl);
            }
          });
          // Area label
          if(nv.length>=3){
            const area=polyAreaM2(nv);
            const centroid=[nv.reduce((s,p)=>s+p[0],0)/nv.length,nv.reduce((s,p)=>s+p[1],0)/nv.length];
            const aLbl=L.tooltip({permanent:true,direction:'center',className:'area-label'}).setLatLng(centroid).setContent(fmtArea(area)+' · '+fmtArea(area*1.43115).replace('m²','v²')).addTo(map);
            activeMarkersRef.current.push(aLbl);
          }
          return nv;
        });
      } else if(measuring){
        const pt=[e.latlng.lat,e.latlng.lng];
        setMeasurePts(prev=>{
          const np=[...prev,pt];
          const mLayer=measureLayerRef.current;if(!mLayer)return np;
          mLayer.clearLayers();
          np.forEach((v,i)=>{
            L.circleMarker(v,{radius:4,color:'#f59e0b',fillColor:'#fbbf24',fillOpacity:1,weight:2}).addTo(mLayer);
            if(i>0){
              L.polyline([np[i-1],v],{color:'#f59e0b',weight:2,dashArray:'4,4'}).addTo(mLayer);
              const d=haversine(np[i-1],v);
              const mid=[(np[i-1][0]+v[0])/2,(np[i-1][1]+v[1])/2];
              L.tooltip({permanent:true,direction:'center',className:'dist-label'}).setLatLng(mid).setContent(fmtDist(d)).addTo(mLayer);
            }
          });
          if(np.length>=2){
            const total=np.reduce((s,v,i)=>i>0?s+haversine(np[i-1],v):0,0);
            L.tooltip({permanent:true,direction:'top',className:'area-label'}).setLatLng(np[np.length-1]).setContent('Total: '+fmtDist(total)).addTo(mLayer);
          }
          return np;
        });
      } else {
        // POT zone identify
        const z=detectZoneKML(e.latlng.lng,e.latlng.lat);
        if(z){
          const zd=ZG[z];
          setClickInfo({lat:e.latlng.lat.toFixed(6),lng:e.latlng.lng.toFixed(6),zone:z,name:zd?.n,ib:zd?.ib,ia:zd?.ia,iau:zd?.iau,hb:zd?.hb,ha:zd?.ha});
        }else{
          setClickInfo({lat:e.latlng.lat.toFixed(6),lng:e.latlng.lng.toFixed(6),zone:null});
        }
      }
    };
    map.on('click',onClick);
    return()=>map.off('click',onClick);
  },[drawing,measuring]);

  // Finish polygon
  const finishPolygon=()=>{
    if(activeVertices.length<3)return;
    const map=mapInstance.current;if(!map)return;
    const area=polyAreaM2(activeVertices);
    const perim=activeVertices.reduce((s,v,i)=>i>0?s+haversine(activeVertices[i-1],v):0,0)+haversine(activeVertices[activeVertices.length-1],activeVertices[0]);
    const zone=detectZoneKML((activeVertices[0][1]+activeVertices[activeVertices.length-1][1])/2,(activeVertices[0][0]+activeVertices[activeVertices.length-1][0])/2);
    // Clean active drawing
    if(activePolyRef.current)map.removeLayer(activePolyRef.current);activePolyRef.current=null;
    activeMarkersRef.current.forEach(m=>map.removeLayer(m));activeMarkersRef.current=[];
    // Create permanent polygon
    const drawLayer=drawLayerRef.current;
    const poly=L.polygon(activeVertices,{color:'#059669',weight:2.5,fillColor:'#34D399',fillOpacity:0.25}).addTo(drawLayer);
    // Labels
    activeVertices.forEach((v,i)=>{
      if(i>0){
        const d=haversine(activeVertices[i-1],v);
        const mid=[(activeVertices[i-1][0]+v[0])/2,(activeVertices[i-1][1]+v[1])/2];
        L.tooltip({permanent:true,direction:'center',className:'dist-label'}).setLatLng(mid).setContent(fmtDist(d)).addTo(drawLayer);
      }
    });
    // Closing segment
    const dClose=haversine(activeVertices[activeVertices.length-1],activeVertices[0]);
    const midClose=[(activeVertices[activeVertices.length-1][0]+activeVertices[0][0])/2,(activeVertices[activeVertices.length-1][1]+activeVertices[0][1])/2];
    L.tooltip({permanent:true,direction:'center',className:'dist-label'}).setLatLng(midClose).setContent(fmtDist(dClose)).addTo(drawLayer);
    // Area label
    const centroid=[activeVertices.reduce((s,p)=>s+p[0],0)/activeVertices.length,activeVertices.reduce((s,p)=>s+p[1],0)/activeVertices.length];
    L.tooltip({permanent:true,direction:'center',className:'area-label'}).setLatLng(centroid).setContent(fmtArea(area)).addTo(drawLayer);
    const id=Date.now();
    setPolygons(prev=>[...prev,{id,vertices:[...activeVertices],area,perim,zone,layerIds:[poly._leaflet_id]}]);
    setActiveVertices([]);
    setDrawing(false);
  };

  const cancelDraw=()=>{
    const map=mapInstance.current;if(!map)return;
    if(activePolyRef.current)map.removeLayer(activePolyRef.current);activePolyRef.current=null;
    activeMarkersRef.current.forEach(m=>map.removeLayer(m));activeMarkersRef.current=[];
    setActiveVertices([]);setDrawing(false);
  };

  const clearAllPolygons=()=>{
    if(drawLayerRef.current)drawLayerRef.current.clearLayers();
    setPolygons([]);
  };

  const clearMeasure=()=>{
    if(measureLayerRef.current)measureLayerRef.current.clearLayers();
    setMeasurePts([]);setMeasuring(false);
  };

  // Search
  const doSearch=async()=>{
    if(!searchQ.trim())return;
    try{
      const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(searchQ+', Guatemala')}&limit=5`);
      const data=await r.json();
      setSearchResults(data.map(d=>({name:d.display_name,lat:+d.lat,lng:+d.lon})));
    }catch{setSearchResults([]);}
  };
  const goToResult=(r)=>{
    const map=mapInstance.current;if(!map)return;
    map.setView([r.lat,r.lng],16);
    if(searchMarkerRef.current)map.removeLayer(searchMarkerRef.current);
    const m=L.marker([r.lat,r.lng]).addTo(map);m._isSearch=true;
    const z=detectZoneKML(r.lng,r.lat);
    m.bindPopup(`<div style="font-family:'DM Sans',sans-serif"><div style="font-weight:700;font-size:12px;margin-bottom:4px">${r.name.split(',')[0]}</div><div style="font-size:11px;color:#64748b">${r.lat.toFixed(5)}, ${r.lng.toFixed(5)}</div>${z?`<div style="margin-top:4px;padding:4px 8px;background:${POT_COLORS[z]};color:white;border-radius:4px;font-size:11px;font-weight:700;text-align:center">${z} — ${ZG[z]?.n}</div>`:''}</div>`).openPopup();
    searchMarkerRef.current=m;
    setSearchResults([]);setSearchQ('');
  };

  return (
    <div className="max-w-[1440px] mx-auto px-4 sm:px-6 py-4">
      <div className="flex items-center justify-between mb-3">
        <div>
          <h2 className="text-lg font-bold text-slate-800">Mapa Estratégico</h2>
          <p className="text-xs text-slate-400">Análisis geoespacial · POT Guatemala · {projects.length} proyecto{projects.length!==1?'s':''}</p>
        </div>
        {/* Search */}
        <div className="flex items-center gap-2">
          <div className="relative">
            <input value={searchQ} onChange={e=>setSearchQ(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doSearch()} placeholder="Buscar ubicación..." className="w-56 px-3 py-2 text-xs border border-slate-200 rounded-lg focus:outline-none focus:border-emerald-400 pr-8"/>
            <button onClick={doSearch} className="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 hover:text-emerald-500"><Ic d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" s={14}/></button>
            {searchResults.length>0&&<div className="absolute top-full mt-1 right-0 w-72 bg-white border border-slate-200 rounded-xl shadow-lg z-50 max-h-60 overflow-y-auto">{searchResults.map((r,i)=><button key={i} onClick={()=>goToResult(r)} className="w-full text-left px-3 py-2 text-xs hover:bg-emerald-50 border-b border-slate-100 last:border-0"><div className="font-medium text-slate-700 truncate">{r.name.split(',').slice(0,3).join(',')}</div><div className="text-[10px] text-slate-400">{r.lat.toFixed(5)}, {r.lng.toFixed(5)}</div></button>)}</div>}
          </div>
        </div>
      </div>

      {/* Toolbar */}
      <div className="flex items-center gap-2 mb-2 flex-wrap">
        <button onClick={()=>{const m=mapInstance.current;if(potRef.current&&m){if(potOn)potRef.current.remove();else{potRef.current.addTo(m);}setPotOn(!potOn);}}} className={`px-3 py-1.5 text-[11px] font-semibold rounded-lg border ${potOn?'bg-emerald-50 border-emerald-300 text-emerald-700':'border-slate-200 text-slate-400'}`}>
          POT {potOn?'✓':''}
        </button>
        <button onClick={()=>{const m=mapInstance.current;if(!m||!satRef.current)return;if(satOn){satRef.current.remove();}else{satRef.current.addTo(m);if(potRef.current&&potOn)potRef.current.bringToFront();}setSatOn(!satOn);}} className={`px-3 py-1.5 text-[11px] font-semibold rounded-lg border ${satOn?'bg-blue-50 border-blue-300 text-blue-700':'border-slate-200 text-slate-400'}`}>
          Satélite {satOn?'✓':''}
        </button>
        <button onClick={()=>setPrediosOn(!prediosOn)} className={`px-3 py-1.5 text-[11px] font-semibold rounded-lg border ${prediosOn?'bg-indigo-50 border-indigo-300 text-indigo-700':'border-slate-200 text-slate-400'}`}>
          <span className="inline-flex items-center gap-1"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="1" y="1" width="10" height="10" rx="1.5"/><path d="M4 1v10M8 1v10M1 4h10M1 8h10"/></svg>Predios {prediosOn?'✓':''}</span>
        </button>
        <div className="w-px h-5 bg-slate-200"/>
        {!drawing&&!measuring&&<button onClick={()=>{setDrawing(true);setClickInfo(null);}} className="px-3 py-1.5 text-[11px] font-semibold rounded-lg border border-emerald-300 text-emerald-700 bg-emerald-50 hover:bg-emerald-100">
          <span className="inline-flex items-center gap-1"><Ic d="M4 6h16M4 12h8m-8 6h16" s={12}/>Dibujar polígono</span>
        </button>}
        {drawing&&<>
          <span className="px-3 py-1.5 text-[11px] font-bold rounded-lg bg-emerald-500 text-white animate-pulse">Dibujando... ({activeVertices.length} pts)</span>

// PLATFORM (main feasibility tool)
// ══════════════════════════════════════════
const Platform=({pjs,setPjs,sv,initialProject,onClearInitial})=>{
  const [cid,setCid]=useState(null);
  const [inp,setInp]=useState({...D});
  const [vw,setVw]=useState("input");
  const [st,setSt]=useState(0);

  useEffect(()=>{
    if(initialProject){
      setInp({...D,...initialProject.inputs});
      setCid(initialProject.id);
      setVw("input");
      setSt(0);
      onClearInitial();
    }
  },[initialProject]);

  const res=useMemo(()=>{try{return calc(inp);}catch(e){console.error(e);return null;}},[inp]);
  const u=(k,v)=>setInp(p=>({...p,[k]:v}));
  const saveP=async()=>{const p={id:cid||Date.now(),inputs:{...inp},at:new Date().toISOString()};sv(cid?pjs.map(x=>x.id===cid?p:x):[...pjs,p]);setCid(p.id);};
  const loadP=p=>{setInp({...D,...p.inputs});setCid(p.id);setVw("input");setSt(0);};
  const newP=()=>{setInp({...D});setCid(null);setVw("input");setSt(0);};
  const delP=id=>{sv(pjs.filter(p=>p.id!==id));if(cid===id)newP();};

  // Compute effective zone and IE from terrains + incentives
  const effZone=getHighestZone(inp.terrenos);
  const peResult=calcIncPE(effZone,inp.incState||{O4:true},inp.incValues||{});
  const ieResult=calcIE(effZone,peResult.pe);
  // IE Aumentado calculation
  const zData=ZG[effZone]||{};
  const iauActive=!!(inp.iauActive)&&!!zData.iau;
  const iauP1=+(inp.iauP1)||0;
  const iauVC=+(inp.iauVC)||0;
  const iauIE=iauActive&&iauP1>0?Math.min(iauP1,zData.iau||99):0;
  const iauAP=iauActive&&iauP1>ieResult.ie&&iauVC>0&&zData.ib>0?iauVC*((iauP1-ieResult.ie)/zData.ib)*0.5:0;
  // Effective IE: if useIECalc, use calculated IE (or IAU if active)
  const effectiveIE=inp.useIECalc?(iauActive&&iauIE>0?iauIE:ieResult.ie):inp.edificabilidad;
  useEffect(()=>{if(inp.useIECalc){u("edificabilidad",effectiveIE);}},[effectiveIE,inp.useIECalc]);
  // Mix de producto
  const mixMdls=inp.mixModels||[];
  const rentableArea=res?.aApt||0;
  // Calculate units: use manual override if set, otherwise floor(assigned/m2)
  const mixCalc=mixMdls.map(m=>{
    const m2=+m.m2||0,pctR=+m.pctRent||0,pk=+m.pk||0;
    const m2Assigned=rentableArea*(pctR/100);
    const autoUnits=m2>0?Math.floor(m2Assigned/m2):0;
    const units=(m.manualUn!=null&&m.manualUn!=='')?+m.manualUn:autoUnits;
    const m2Used=units*m2;
    return{...m,m2Assigned,autoUnits,units,m2Used,pk};
  });
  const mixTotalUn=mixCalc.reduce((s,m)=>s+m.units,0);
  const mixTotalPctR=mixCalc.reduce((s,m)=>s+(+m.pctRent||0),0);
  const mixTotalM2=mixCalc.reduce((s,m)=>s+m.m2Assigned,0);
  const mixTotalM2Used=mixCalc.reduce((s,m)=>s+m.m2Used,0);
  const mixDeficit=rentableArea-mixTotalM2Used;
  const mixAdjPctVend=res?.aE>0?(mixTotalM2Used/res.aE*100):0;
  const mixPondM2=mixTotalUn>0?mixCalc.reduce((a,m)=>a+m.units*(+m.m2||0),0)/mixTotalUn:0;
  const mixTotalPk=mixCalc.reduce((s,m)=>s+m.units*(+m.pk||0),0);
  const mixPkPerApt=mixTotalUn>0?mixTotalPk/mixTotalUn:0;
  // CHANGE 2: Auto-feed mix producto → producto (tamApto + parqApto)
  useEffect(()=>{if(mixMdls.length>0&&mixPondM2>0&&mixTotalUn>0){u("tamApto",Math.round(mixPondM2*100)/100);u("parqApto",Math.round(mixPkPerApt*1000)/1000);u("mixNApt",mixTotalUn);u("mixNPk",Math.ceil(mixTotalPk));}else{u("mixNApt",0);u("mixNPk",0);}},[mixPondM2,mixPkPerApt,mixTotalUn,mixTotalPk,mixMdls.length]);
  // CHANGE 3: Permeability from incentive O5
  const permFromInc=!!(inp.incState||{}).O5&&((inp.incValues||{}).O5p||0)>0;
  const permPct=permFromInc?((inp.incValues||{}).O5p||0):0;
  useEffect(()=>{u("perm",permFromInc?"Si":"No");},[permFromInc]);
  // Auto-feed IAU cost into inputs for calc engine (licencias)
  useEffect(()=>{u("iauCost",iauActive?iauAP:0);},[iauAP,iauActive]);

  const steps=[
    {name:"Terreno",short:"Terreno",icon:ic.terrain},
    {name:"Edificabilidad",short:"Edific.",icon:ic.ruler},
    {name:"Compra Terreno",short:"Compra",icon:ic.land},
    {name:"Producto",short:"Producto",icon:ic.bldg},
    {name:"Ventas",short:"Ventas",icon:ic.dollar},
    {name:"Costos",short:"Costos",icon:ic.hammer},
    {name:"Financiamiento",short:"Capital",icon:ic.dollar},
    {name:"Resultados",short:"Resultado",icon:ic.chart},
    {name:"Cuotas",short:"Cuotas",icon:ic.dollar},
  ];
  const iS=v=>v>0.15?"good":v>0.10?"warn":v!=null?"bad":null;
  const mS=v=>v>1.5?"good":v>1.2?"warn":v!=null?"bad":null;

  return (
    <div>
      {/* Sub header */}
      <div className="bg-white border-b border-slate-100">
        <div className="max-w-[1440px] mx-auto px-4 sm:px-6 py-2 flex items-center gap-2">
          <button onClick={()=>setVw(vw==="list"?"input":"list")} className={`flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold rounded-lg ${vw==="list"?"bg-slate-800 text-white":"text-slate-500 hover:bg-slate-100"}`}>
            <Ic d={ic.list} s={14}/><span className="hidden sm:inline">Proyectos</span>
            <span className="bg-slate-200 text-slate-600 text-[10px] font-bold px-1.5 py-0.5 rounded-full">{pjs.length}</span>
          </button>
          <button onClick={newP} className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold rounded-lg bg-emerald-500 text-white hover:bg-emerald-600 shadow-sm">
            <Ic d={ic.plus} s={14}/><span className="hidden sm:inline">Nuevo</span>
          </button>
        </div>
      </div>

      {/* PROJECT LIST */}
      {vw==="list"&&(
        <div className="max-w-3xl mx-auto px-4 sm:px-6 py-8">
          <h2 className="text-lg font-bold text-slate-800 mb-4">Proyectos guardados</h2>
          {pjs.length===0
            ? <div className="text-center py-16 bg-white rounded-2xl border border-slate-200"><div className="text-4xl mb-3 opacity-30">📋</div><div className="text-sm text-slate-400 mb-3">Sin proyectos</div><button onClick={newP} className="px-4 py-2 bg-emerald-500 text-white font-semibold rounded-lg text-sm">Crear análisis</button></div>
            : <div className="space-y-2">{pjs.map(p=>{
                const r=(()=>{try{return calc({...D,...p.inputs});}catch{return null;}})();
                return (
                  <div key={p.id} className="bg-white rounded-xl border border-slate-200 px-5 py-4 flex items-center justify-between hover:shadow-md cursor-pointer group" onClick={()=>loadP(p)}>
                    <div className="flex-1">
                      <div className="text-base font-semibold text-slate-800 group-hover:text-emerald-700">{p.inputs.nombre||"Sin nombre"}</div>
                      <div className="text-xs text-slate-400 mt-0.5">{p.inputs.ubicacion||""}{p.inputs.equipo?' · '+p.inputs.equipo:''} · {new Date(p.at).toLocaleDateString()}</div>
                      {r&&<div className="flex gap-4 mt-2">
                        <span className="text-xs"><span className="text-slate-400">TIR: </span><span className={`font-mono font-bold ${r.airrBT>0.15?"text-emerald-600":"text-red-500"}`}>{r.airrBT?fp(r.airrBT):"—"}</span></span>
                        <span className="text-xs"><span className="text-slate-400">MOIC: </span><span className="font-mono font-bold">{f2(r.moicBT)}x</span></span>
                      </div>}
                    </div>
                    <button onClick={e=>{e.stopPropagation();delP(p.id);}} className="p-2 text-slate-300 hover:text-red-500 rounded-lg"><Ic d={ic.trash} s={16}/></button>
                  </div>
                );
              })}</div>
          }
        </div>
      )}

      {/* MAIN EDITOR */}
      {vw!=="list"&&(
        <div className="max-w-[1440px] mx-auto px-4 sm:px-6 py-4">
          <div className="flex flex-col sm:flex-row items-start sm:items-center gap-3 mb-4">
            <div className="flex-1 flex flex-col gap-2 w-full">
              <div className="flex items-center gap-3">
                <input value={inp.nombre} onChange={e=>u("nombre",e.target.value)} placeholder="Nombre del proyecto" className="text-lg font-bold text-slate-800 bg-transparent border-b-2 border-transparent hover:border-slate-200 focus:border-emerald-500 outline-none py-1 flex-1"/>
                <input value={inp.ubicacion} onChange={e=>u("ubicacion",e.target.value)} placeholder="Ubicación" className="text-sm text-slate-500 bg-transparent border-b border-transparent hover:border-slate-200 focus:border-emerald-500 outline-none py-1 w-36"/>
              </div>
              <div className="flex items-center gap-3">
                <select value={inp.equipo||''} onChange={e=>u("equipo",e.target.value)} className="text-xs text-slate-500 bg-white border border-slate-200 rounded-lg px-2 py-1.5 focus:outline-none focus:border-emerald-400">
                  <option value="">Equipo evaluador...</option>
                  <option>Intus Capital</option>
                  <option>Intus Inteligencia de Mercado</option>
                  <option>Intus Avalúos</option>
                  <option>Intus Comercialización</option>
                  <option>Intus Desarrollo</option>
                </select>
                <input value={inp.desarrollador||''} onChange={e=>u("desarrollador",e.target.value)} placeholder="Desarrollador / cliente" className="text-xs text-slate-500 bg-transparent border-b border-transparent hover:border-slate-200 focus:border-emerald-400 outline-none py-1 flex-1"/>
              </div>
            </div>
            <div className="flex items-center gap-2">
              <input type="number" value={inp.lat} onChange={e=>u("lat",parseFloat(e.target.value)||0)} placeholder="Lat" className="w-24 px-2 py-1.5 text-xs text-slate-500 border border-slate-200 rounded-lg focus:outline-none" step="0.0001"/>
              <input type="number" value={inp.lng} onChange={e=>u("lng",parseFloat(e.target.value)||0)} placeholder="Lng" className="w-24 px-2 py-1.5 text-xs text-slate-500 border border-slate-200 rounded-lg focus:outline-none" step="0.0001"/>
              <button onClick={saveP} className="flex items-center gap-2 px-4 py-2 bg-slate-800 text-white text-xs font-bold rounded-lg hover:bg-slate-700 shadow-sm"><Ic d={ic.save} s={14}/>Guardar</button>
            </div>
          </div>

          <div className="flex gap-1 mb-4 bg-white rounded-xl p-1 border border-slate-200 overflow-x-auto">
            {steps.map((s,idx)=>(
              <button key={idx} onClick={()=>setSt(idx)} className={`flex-1 flex items-center justify-center gap-1.5 min-w-0 px-1.5 py-2.5 rounded-lg text-xs font-semibold whitespace-nowrap ${st===idx?"bg-emerald-500 text-white shadow-sm":"text-slate-400 hover:bg-slate-50"}`}>
                <Ic d={s.icon} s={13}/><span className="hidden md:inline">{s.name}</span><span className="md:hidden">{s.short}</span>
              </button>
            ))}
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-12 gap-4">
            <div className="lg:col-span-8 space-y-4">
              {/* STEP 0 */}
              {st===0&&<div className="grid grid-cols-1 md:grid-cols-2 gap-4">

                        <input type="number" className="col-span-2 px-1 py-1 border border-slate-200 rounded text-xs text-center" value={t.areaM2||''} placeholder="m²" onChange={e=>{const ts=[...(inp.terrenos||[])];ts[i]={...ts[i],areaM2:+e.target.value||0};u("terrenos",ts);}}/>

                      </div>);

                    <button onClick={()=>{const ts=[...(inp.terrenos||[])];ts.push({id:Date.now(),nombre:'Terreno '+(ts.length+1),areaM2:0,pot:'G4',potZone:effZone,precioVara:0,pagos:[]});u("terrenos",ts);}} className="w-full py-1.5 border-2 border-dashed border-slate-200 rounded-lg text-xs font-semibold text-slate-400 hover:border-emerald-300 hover:text-emerald-500 mt-2">+ Agregar terreno</button>
                  </div>
                  <div className="px-3 py-2 bg-slate-50 rounded-lg mx-3"><div className="flex justify-between text-xs"><span className="text-slate-500">Área total</span><span className="font-bold">{f0(res?.aTerrTotal)} m² / {f0((res?.aTerrTotal||0)*1.43115)} v²</span></div>
                  <div className="flex justify-between text-xs mt-1"><span className="text-slate-500">Zona POT efectiva (más alta)</span><span className="font-bold text-emerald-600 font-mono">{effZone} — {ZG[effZone]?.n}</span></div></div>
                  <Sub t="Parámetros de zona"/>

                          {slices.map((s,i)=>{const pct=s.v/total;const start=cum;cum+=pct;const startA=start*2*Math.PI-Math.PI/2;const endA=(start+pct)*2*Math.PI-Math.PI/2;const large=pct>0.5?1:0;const x1=100+80*Math.cos(startA),y1=100+80*Math.sin(startA);const x2=100+80*Math.cos(endA),y2=100+80*Math.sin(endA);return pct>=0.999?<circle key={i} cx="100" cy="100" r="80" fill={s.c}/>:<path key={i} d={`M100,100 L${x1},${y1} A80,80 0 ${large},1 ${x2},${y2} Z`} fill={s.c}/>;})}

                    const svgH=180,svgW=400,pad=50,barW=40,gap=(svgW-pad*2-barW*bars.length)/(bars.length-1);

                    const r=inp.tasaFin/100/12;const n=inp.plazoMeses||300;const tc=inp.tipoCambio||7.7;
                    const pmt=(monto)=>r>0&&n>0?monto*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1):0;

            </div></div>
          </div>
        </div>
      )}
    </div>
  );
};

  const CostTable=({data,labels})=>{

          <th className="text-right py-2 px-2 text-xs font-bold text-red-600 whitespace-nowrap min-w-[72px] bg-red-50/50">MÁX</th>
        </tr></thead>
        <tbody>
          {Object.entries(labels).map(([key,label])=>{
            const hasAny=filtered.some(p=>getSec(p,data)[key]);
            if(!hasAny) return null;
            const s=stats(key,data);
            return (
              <tr key={key} className="border-b border-slate-100 hover:bg-emerald-50/30">
                <td className="py-2 px-3 text-slate-600 sticky left-0 bg-white">{label}</td>
                {filtered.map(p=>{const v=getSec(p,data)[key];return (
                  <td key={p.name} className="text-right py-2 px-2 font-mono text-slate-700">{v!=null?`$${v.toFixed(2)}`:<span className="text-slate-300">—</span>}</td>
                );})}
                {statCell(s.min,"text-blue-700 bg-blue-50/30 border-l-2 border-blue-100")}
                {statCell(s.avg,"text-amber-700 bg-amber-50/30")}
                {statCell(s.max,"text-red-700 bg-red-50/30")}

            {filtered.map(p=>{const sec=getSec(p,data);return (
              <td key={p.name} className="text-right py-2.5 px-2 font-mono text-emerald-700">{sec.total!=null?`$${sec.total.toFixed(2)}`:<span className="text-slate-300">—</span>}</td>
            );})}
            <td className="text-right py-2.5 px-2 font-mono text-blue-700 font-bold bg-blue-50/50 border-l-2 border-blue-200">{tMin!=null?`$${tMin.toFixed(2)}`:"—"}</td>
            <td className="text-right py-2.5 px-2 font-mono text-amber-700 font-bold bg-amber-50/50">{tAvg!=null?`$${tAvg.toFixed(2)}`:"—"}</td>
            <td className="text-right py-2.5 px-2 font-mono text-red-700 font-bold bg-red-50/50">{tMax!=null?`$${tMax.toFixed(2)}`:"—"}</td>
          </tr>
        </tbody>
      </table>
    </div>
  );};

  return (
    <div className="max-w-[1440px] mx-auto px-4 sm:px-6 py-6">
      {/* Header + Filters */}
      <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
        <div><h2 className="text-lg font-bold text-slate-800">Referenciales de Obras</h2><p className="text-sm text-slate-400">{filtered.length} de {REF_DATA.length} proyectos · Costos en $/m² con IVA</p></div>
        <div className="flex flex-wrap gap-2">
          <select value={filtCat} onChange={e=>setFiltCat(e.target.value)} className="px-3 py-1.5 text-xs font-medium border border-slate-200 rounded-lg bg-white focus:outline-none">
            <option value="all">Todas las categorías</option>
            {REF_CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
          <select value={filtZona} onChange={e=>setFiltZona(e.target.value)} className="px-3 py-1.5 text-xs font-medium border border-slate-200 rounded-lg bg-white focus:outline-none">
            <option value="all">Todas las zonas</option>
            {zonas.map(z=><option key={z} value={z}>{z}</option>)}
          </select>
          <select value={filtTipo} onChange={e=>setFiltTipo(e.target.value)} className="px-3 py-1.5 text-xs font-medium border border-slate-200 rounded-lg bg-white focus:outline-none">
            <option value="all">Todos los tipos</option>
            {tipos.map(t=><option key={t} value={t}>{t}</option>)}
          </select>
        </div>
      </div>

      {/* Project pills */}
      <div className="flex flex-wrap gap-2 mb-4">
        {filtered.map(p=>(
          <button key={p.name} onClick={()=>setSelProj(selProj===p.name?null:p.name)}
            className={`px-3 py-1.5 rounded-full text-xs font-semibold transition-all ${selProj===p.name?"bg-emerald-500 text-white shadow-sm":"bg-white border border-slate-200 text-slate-600 hover:border-emerald-300"}`}>
            {p.name} <span className="opacity-60">· {p.categoria||"—"}</span>
          </button>
        ))}
      </div>

      {/* Project detail card */}
      {selProj&&(()=>{const p=REF_DATA.find(x=>x.name===selProj);if(!p)return null;return (
        <div className="bg-white rounded-2xl border border-emerald-200 p-5 mb-6 shadow-sm">
          <div className="flex items-start justify-between mb-3">
            <div><h3 className="text-base font-bold text-slate-800">{p.name}</h3><span className="text-xs bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full font-medium">{p.categoria||"Sin categoría"}</span></div>
            <button onClick={()=>setSelProj(null)} className="text-slate-300 hover:text-slate-500"><Ic d={ic.trash} s={16}/></button>
          </div>
          <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-3">
            {Object.entries(REF_CHAR_LABELS).map(([k,label])=>{
              const v=p.caracteristicas[k];
              if(!v&&v!==0) return null;
              return <div key={k}><div className="text-[11px] text-slate-400">{label}</div><div className="text-sm font-semibold text-slate-700">{v}</div></div>;
            })}
          </div>
        </div>
      );})()}

      {/* Sub-tabs */}
      <div className="flex gap-1 mb-4 bg-white rounded-xl p-1 border border-slate-200">
        {[["construccion","Construcción"],["equipo","Equipo y Mobiliario"],["tecnico","Gastos Técnicos"]].map(([k,l])=>(
          <button key={k} onClick={()=>setSubTab(k)} className={`flex-1 py-2.5 text-xs font-semibold rounded-lg transition-all ${subTab===k?"bg-emerald-500 text-white shadow-sm":"text-slate-400 hover:bg-slate-50"}`}>{l}</button>
        ))}
      </div>

      {/* Cost tables */}
      <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
        {filtered.length===0
          ? <div className="text-center py-12 text-slate-400 text-sm">No hay proyectos que coincidan con los filtros</div>
          : <div className="p-4">
              {subTab==="construccion"&&<CostTable data="construccion" labels={REF_CONST_LABELS}/>}
              {subTab==="equipo"&&<CostTable data="equipo" labels={REF_EQUIP_LABELS}/>}
              {subTab==="tecnico"&&<CostTable data="tecnico" labels={REF_TECH_LABELS}/>}
            </div>
        }
      </div>
    </div>
  );
};

// ══════════════════════════════════════════
// HUB — Central Dashboard
// ══════════════════════════════════════════
const HubView=({pjs,refsCount,onNav})=>{
  const lastProj=pjs.length>0?pjs[pjs.length-1]:null;
  const totalAptos=pjs.reduce((s,p)=>{try{const r=calc({...D,...p});return s+(r.nApt||0);}catch{return s;}},0);

  const ModuleCard=({icon,title,desc,count,label,tab,color})=>(
    <button onClick={()=>onNav(tab)} className="bg-white rounded-2xl border border-slate-200 p-5 text-left hover:border-emerald-300 hover:shadow-md transition-all group">
      <div className="flex items-start justify-between mb-3">
        <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${color}`}>
          <Ic d={icon} s={18} className="text-white"/>
        </div>
        {count!=null&&<span className="text-2xl font-bold text-slate-800">{count}</span>}
      </div>
      <div className="text-sm font-semibold text-slate-800 mb-1">{title}</div>
      <div className="text-xs text-slate-400 mb-3">{desc}</div>
      {label&&<div className="text-[10px] text-slate-300 uppercase tracking-wider">{label}</div>}
      <div className="flex items-center gap-1 text-xs text-emerald-500 font-medium mt-2 opacity-0 group-hover:opacity-100 transition-opacity">
        Abrir módulo <Ic d="M9 5l7 7-7 7" s={12}/>
      </div>
    </button>
  );

  return (
    <div className="max-w-[1200px] mx-auto px-4 sm:px-6 py-8">
      <div className="mb-8">
        <h1 className="text-2xl font-bold text-slate-800 mb-1">Bienvenido a INTUS Platform</h1>
        <p className="text-sm text-slate-400">Plataforma integral de conocimiento empresarial</p>
      </div>

      {/* Metric cards */}
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-8">
        <div className="bg-white rounded-xl border border-slate-200 p-4">
          <div className="text-xs text-slate-400 mb-1">Terrenos evaluados</div>
          <div className="text-xl font-bold text-slate-800">{pjs.length}</div>
        </div>
        <div className="bg-white rounded-xl border border-slate-200 p-4">
          <div className="text-xs text-slate-400 mb-1">Apartamentos modelados</div>
          <div className="text-xl font-bold text-slate-800">{f0(totalAptos)}</div>
        </div>
        <div className="bg-white rounded-xl border border-slate-200 p-4">
          <div className="text-xs text-slate-400 mb-1">Referenciales de obra</div>
          <div className="text-xl font-bold text-slate-800">{refsCount}</div>
        </div>
        <div className="bg-white rounded-xl border border-slate-200 p-4">
          <div className="text-xs text-slate-400 mb-1">Último proyecto</div>
          <div className="text-sm font-semibold text-slate-800 truncate">{lastProj?.nombre||lastProj?.ubicacion||"—"}</div>
        </div>
      </div>

      {/* Module grid */}
      <div className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Módulos</div>
      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-8">
        <ModuleCard icon={ic.chart} title="Prefactibilidad" desc="Modelo financiero de desarrollo inmobiliario. TIR, MOIC, P&L, flujos." count={pjs.length} label="proyectos" tab="platform" color="bg-emerald-500"/>
        <ModuleCard icon={ic.map} title="Mapa Estratégico" desc="Análisis geoespacial, POT, medición de terrenos y zonas urbanísticas." count={pjs.filter(p=>p.inputs?.lat&&p.inputs?.lng).length} label="ubicaciones" tab="map" color="bg-indigo-500"/>
        <ModuleCard icon={ic.land} title="Referenciales de obra" desc="Benchmarks de costos de construcción, equipo y gastos técnicos." count={refsCount} label="proyectos" tab="refs" color="bg-amber-500"/>
      </div>

      {/* Upcoming modules */}
      <div className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Próximamente</div>
      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-8">
        {[
          {title:"Inteligencia de mercado",desc:"Bases de datos de mercado, competencia, brochures, Tableau, tráfico.",color:"bg-teal-500"},
          
          {title:"Avalúos y valores",desc:"Valores de tierra por zona, historial de avalúos, tendencias.",color:"bg-orange-500"},
        ].map((m,i)=>(
          <div key={i} className="bg-slate-50 rounded-2xl border border-dashed border-slate-200 p-5 opacity-60">
            <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${m.color} mb-3 opacity-50`}>
              <Ic d={ic.chart} s={18} className="text-white"/>
            </div>
            <div className="text-sm font-semibold text-slate-500 mb-1">{m.title}</div>
            <div className="text-xs text-slate-400">{m.desc}</div>
            <div className="mt-3 text-[10px] text-slate-300 font-medium uppercase tracking-wider">En desarrollo</div>
          </div>
        ))}
      </div>

      {/* Export / Import */}
      <div className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Datos</div>
      <div className="flex flex-wrap gap-3">
        <button onClick={()=>{
          const data={version:"intus-v2",exportDate:new Date().toISOString(),projects:pjs};
          const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
          const url=URL.createObjectURL(blob);const a=document.createElement("a");
          a.href=url;a.download=`intus_backup_${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);
        }} className="flex items-center gap-2 px-4 py-2.5 bg-white border border-slate-200 rounded-xl text-xs font-semibold text-slate-600 hover:border-emerald-300 hover:text-emerald-600 transition-all">
          <Ic d="M12 10v6m0 0l-3-3m3 3l3-3M3 17v3a2 2 0 002 2h14a2 2 0 002-2v-3" s={16}/>
          Exportar datos (JSON)
        </button>
        <label className="flex items-center gap-2 px-4 py-2.5 bg-white border border-slate-200 rounded-xl text-xs font-semibold text-slate-600 hover:border-emerald-300 hover:text-emerald-600 transition-all cursor-pointer">
          <Ic d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" s={16}/>
          Importar datos
          <input type="file" accept=".json" className="hidden" onChange={e=>{
            const file=e.target.files[0];if(!file)return;
            const reader=new FileReader();
            reader.onload=ev=>{try{
              const d=JSON.parse(ev.target.result);
              if(d.projects&&Array.isArray(d.projects)){
                if(confirm(`Se encontraron ${d.projects.length} proyectos. ¿Importar y reemplazar datos actuales?`)){
                  onNav("_import",d.projects);
                }
              }else{alert("Archivo no válido");}
            }catch{alert("Error al leer archivo");}};
            reader.readAsText(file);e.target.value="";
          }}/>
        </label>
      </div>
    </div>
  );
};

// ══════════════════════════════════════════
// ROOT APP — INTUS PLATFORM v2
// ══════════════════════════════════════════
function App(){
  const [pjs,setPjs]=useState([]);
  const [mainTab,setMainTab]=useState("hub");
  const [openProjectId,setOpenProjectId]=useState(null);
  const [idbReady,setIdbReady]=useState(false);

  // Migrate localStorage → IndexedDB on first load, then use IDB
  useEffect(()=>{
    (async()=>{
      try{
        // Try IndexedDB first
        const idbData=await idbGet(SK);
        if(idbData?.value){
          setPjs(typeof idbData.value==="string"?JSON.parse(idbData.value):idbData.value);
          setIdbReady(true);return;
        }
        // Fallback: migrate from localStorage
        const lsData=storage.get(SK);
        if(lsData?.value){
          const parsed=JSON.parse(lsData.value);
          setPjs(parsed);
          await idbSet(SK,parsed);
          setIdbReady(true);return;
        }
        setIdbReady(true);
      }catch(e){
        console.warn("IDB init failed, using localStorage",e);
        const r=storage.get(SK);
        if(r?.value) setPjs(JSON.parse(r.value));
        setIdbReady(true);
      }
    })();
  },[]);

  const sv=useCallback(np=>{
    setPjs(np);
    // Save to both for redundancy
    idbSet(SK,np).catch(()=>{});
    try{storage.set(SK,JSON.stringify(np));}catch{}
  },[]);

  // Global callback for map popups
  useEffect(()=>{
    window.__openProject=id=>{
      const p=pjs.find(x=>String(x.id)===String(id));
      if(p){setOpenProjectId(p);setMainTab("platform");}
    };
  },[pjs]);

  const clearInitial=()=>setOpenProjectId(null);

  // Count referenciales (from hardcoded data in ReferencialesView)
  const refsCount=12;

  const handleHubNav=(tab,data)=>{
    if(tab==="_import"&&data){sv(data);return;}
    setMainTab(tab);
  };

  const tabs=[
    {id:"hub",label:"Hub",icon:"M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"},
    {id:"platform",label:"Prefactibilidad",icon:ic.chart},
    {id:"map",label:"Mapa Estratégico",icon:ic.map},
    {id:"refs",label:"Referenciales",icon:ic.land},
  ];

  if(!idbReady)return(
    <div className="min-h-screen bg-slate-50 flex items-center justify-center">
      <div className="text-center">
        <div className="w-8 h-8 border-2 border-emerald-400 border-t-transparent rounded-full animate-spin mx-auto mb-3"/>
        <div className="text-sm text-slate-400">Cargando INTUS Platform...</div>
      </div>
    </div>
  );

  return (
    <div className="min-h-screen bg-slate-50">
      {/* GLOBAL HEADER */}
      <header className="bg-white border-b border-slate-200 sticky top-0 z-[1000]">
        <div className="max-w-[1440px] mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
          <div className="flex items-center gap-4">
            <IntusLogo size={28}/>
            <div className="hidden sm:block h-6 w-px bg-slate-200"/>
            <span className="hidden sm:block text-xs font-medium text-emerald-500 tracking-wide">Platform</span>
          </div>
          <div className="flex items-center gap-1 bg-slate-100 rounded-lg p-1">
            {tabs.map(t=>(
              <button key={t.id} onClick={()=>setMainTab(t.id)} className={`flex items-center gap-1.5 px-3 sm:px-4 py-2 text-xs font-semibold rounded-lg transition-all ${mainTab===t.id?"bg-white text-slate-800 shadow-sm":"text-slate-400 hover:text-slate-600"}`}>
                <Ic d={t.icon} s={14}/><span className="hidden sm:inline">{t.label}</span>
              </button>
            ))}
          </div>
        </div>
      </header>

      {mainTab==="hub"&&<HubView pjs={pjs} refsCount={refsCount} onNav={handleHubNav}/>}
      {mainTab==="platform"&&<Platform pjs={pjs} setPjs={setPjs} sv={sv} initialProject={openProjectId} onClearInitial={clearInitial}/>}
      {mainTab==="map"&&<MapView projects={pjs} onOpenProject={id=>{const p=pjs.find(x=>String(x.id)===String(id));if(p){setOpenProjectId(p);setMainTab("platform");}}}/>}
      {mainTab==="refs"&&<ReferencialesView/>}

      <div className="mt-8 pb-6 text-center"><div className="text-[11px] text-slate-300">INTUS Platform v3 · {new Date().getFullYear()}</div></div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
